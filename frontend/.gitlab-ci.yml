stages:
  - test
  - build
  - scan
  - push
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  CI_REGISTRY: docker.io
  IMAGE_NAME: $CI_REGISTRY_USER/portfolio-frontend
  IMAGE_TAG: $IMAGE_NAME:dev-$CI_COMMIT_SHORT_SHA
  K8S_NAMESPACE: portfolio
  TZ: Asia/Ho_Chi_Minh
  INTERNAL_API_URL: "http://portfolio-backend-staging:3001"

.notify_template: &notify_template
  after_script:
    - sh .gitlab-ci/notify.sh $CI_JOB_STATUS $CI_JOB_STAGE

# DRY Template for Docker-in-Docker Jobs
.docker_template: &docker_template
  image: docker:latest
  services:
    - docker:dind
  tags:
    - agent-1
  before_script:
    - 'docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY'

# ==========================================
# STAGING JOBS (dev branch)
# ==========================================

sync_api:
  stage: test
  image: node:22-alpine
  tags:
    - agent-1
  script:
    - corepack enable && corepack prepare pnpm@9.15.4 --activate
    - pnpm install --no-frozen-lockfile --ignore-scripts
    - |
      if [ -n "$BACKEND_SWAGGER_URL" ]; then
        curl -sSL $BACKEND_SWAGGER_URL -o backend-swagger.json
        export SWAGGER_PATH="./backend-swagger.json"
      fi
    - pnpm run api:sync
  artifacts:
    paths:
      - src/types/api.generated.ts
    expire_in: 1 week
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG =~ /^v.*/'

build_staging:
  <<: *docker_template
  stage: build
  before_script: [] # Overwrite before_script since we don't login here
  script:
    - 'echo "Building Staging Image: $IMAGE_TAG"'
    - 'docker build --pull --build-arg INTERNAL_API_URL=$INTERNAL_API_URL -t $IMAGE_TAG .'
    - 'docker save -o frontend-image.tar $IMAGE_TAG'
  dependencies:
    - sync_api
  artifacts:
    paths:
      - frontend-image.tar
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
    - if: '$CI_COMMIT_BRANCH == "main"'

scan_staging:
  stage: scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  tags:
    - agent-1
  script:
    - trivy image --input frontend-image.tar --exit-code 0 --severity LOW,MEDIUM --no-progress
    - trivy image --input frontend-image.tar --exit-code 1 --severity HIGH,CRITICAL --no-progress
  dependencies:
    - build_staging
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
    - if: '$CI_COMMIT_BRANCH == "main"'

push_staging:
  <<: *docker_template
  stage: push
  script:
    - 'docker load -i frontend-image.tar'
    - 'docker push $IMAGE_TAG'
  dependencies:
    - build_staging
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
    - if: '$CI_COMMIT_BRANCH == "main"'

deploy_staging_frontend:
  stage: deploy
  image: alpine:latest
  tags:
    - agent-1
  script:
    - 'apk add --no-cache git'
    - 'git config --global user.email "ci-bot@luumac.io.vn"'
    - 'git config --global user.name "CI Bot"'
    - 'git clone https://oauth2:${GITLAB_API_TOKEN}@gitlab.com/portfolio-macld/portfolio-infratructure.git infra-repo'
    - 'cd infra-repo'
    - 'sed -i "s/tag: .*/tag: \"dev-$CI_COMMIT_SHORT_SHA\"/" environments/staging/frontend-values.yaml'
    - 'git add environments/staging/frontend-values.yaml'
    - 'git commit -m "chore(deploy): update frontend to dev-$CI_COMMIT_SHORT_SHA [skip ci]" || echo "No changes to commit"'
    - 'git push origin main'
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ==========================================
# PRODUCTION JOBS (v* Tag)
# ==========================================

promote_production:
  <<: *docker_template
  stage: push
  script:
    - 'export TARGET_TAG=$CI_COMMIT_TAG'
    - 'echo "Searching for built staging image in recent commit history..."'
    - |
      COMMITS=$(git log --pretty=format:"%H" -n 10 | cut -c 1-8)
      FOUND=false
      for SHA in $COMMITS; do
        SOURCE_TAG="dev-$SHA"
        echo "Checking registry for image: $IMAGE_NAME:$SOURCE_TAG"
        if docker pull $IMAGE_NAME:$SOURCE_TAG; then
          echo "Staging image found: $IMAGE_NAME:$SOURCE_TAG"
          echo "Promoting to production: $IMAGE_NAME:$TARGET_TAG"
          docker tag $IMAGE_NAME:$SOURCE_TAG $IMAGE_NAME:$TARGET_TAG
          docker push $IMAGE_NAME:$TARGET_TAG
          FOUND=true
          break
        fi
      done
      if [ "$FOUND" = false ]; then
        echo "ERROR: Staging image not found in registry for the last 10 commits!"
        exit 1
      fi
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v.*/'

deploy_production_frontend:
  stage: deploy
  image: alpine:latest
  tags:
    - agent-1
  script:
    - 'apk add --no-cache git'
    - 'git config --global user.email "ci-bot@luumac.io.vn"'
    - 'git config --global user.name "CI Bot"'
    - 'git clone https://oauth2:${GITLAB_API_TOKEN}@gitlab.com/portfolio-macld/portfolio-infratructure.git infra-repo'
    - 'cd infra-repo'
    - 'sed -i "s/tag: .*/tag: \"$CI_COMMIT_TAG\"/" environments/production/frontend-values.yaml'
    - 'git add environments/production/frontend-values.yaml'
    - 'git commit -m "chore(deploy): update frontend to $CI_COMMIT_TAG [skip ci]" || echo "No changes to commit"'
    - 'git push origin main'
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v.*/'
      when: manual
      allow_failure: false
