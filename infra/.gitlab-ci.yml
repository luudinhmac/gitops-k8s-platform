# Description: GitLab CI/CD pipeline for the infrastructure repository.
# Handles automatic image tag updates in environment-specific values files.
# Last Updated: 2026-05-12

stages:
  - update_config

variables:
  TZ: Asia/Ho_Chi_Minh

update_image_tag:
  stage: update_config
  image: alpine:latest
  tags:
    - agent-1
  before_script:
    - apk add --no-cache git sed
    # Cấu hình Git để có thể commit
    - git config --global user.email "ci-bot@luumac.io.vn"
    - git config --global user.name "CI Bot"
    # Thiết lập Remote URL với Token (giả sử bạn dùng PROJECT_ACCESS_TOKEN)
    - git remote set-url origin https://oauth2:${PROJECT_ACCESS_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git
  script:
    - |
      set -e
      echo "Updating $COMPONENT image tag to $IMAGE_TAG in $ENVIRONMENT environment"
      
      # Xác định file cần sửa dựa trên môi trường và component
      # Cấu trúc: environments/[staging|production]/[frontend|backend]-values.yaml
      TARGET_FILE="environments/${ENVIRONMENT}/${COMPONENT}-values.yaml"
      
      if [ ! -f "$TARGET_FILE" ]; then
        echo "Error: File $TARGET_FILE not found!"
        exit 1
      fi

      # Dùng sed để sửa tag trong file yaml
      # Tìm dòng 'tag:' và thay thế giá trị đằng sau nó
      sed -i "s/tag: .*/tag: \"$IMAGE_TAG\"/" $TARGET_FILE
      
      # Kiểm tra thay đổi
      git diff $TARGET_FILE
      
      # Commit và Push
      git add $TARGET_FILE
      git commit -m "chore(deploy): update $COMPONENT image to $IMAGE_TAG for $ENVIRONMENT"
      git push origin HEAD:main
  rules:
    # Chỉ chạy khi được trigger từ pipeline khác (Frontend/Backend)
    - if: '$CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "trigger"'
