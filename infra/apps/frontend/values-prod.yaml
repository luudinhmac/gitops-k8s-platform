# Description: Production override values for the frontend service.
# Used when deploying to the production environment via ArgoCD or Helm.
# Last Updated: 2026-05-12

replicaCount: 2

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

image:
  repository: luudinhmac/portfolio-frontend
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 3000

env:
  tz: "Asia/Ho_Chi_Minh"
  internalApiUrl: "http://portfolio-backend:3001"

ingress:
  host: "blog.luumac.io.vn"
  issuer: "letsencrypt-prod"
  secretName: "luumac-tls-prod"

namespace: portfolio-prod
