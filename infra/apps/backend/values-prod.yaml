# Description: Production override values for the backend service.
# Used when deploying to the production environment via ArgoCD or Helm.
# Last Updated: 2026-05-12

replicaCount: 2

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

image:
  repository: luudinhmac/portfolio-backend
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 3001

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

persistence:
  size: 10Gi
  path: /data/k8s/storage/backend-uploads-prod

env:
  tz: "Asia/Ho_Chi_Minh"
  port: "3001"

ingress:
  host: "luumac.io.vn"
  issuer: "letsencrypt-prod"
  secretName: "luumac-tls-prod"

namespace: portfolio-prod
