# Description: Default Helm values for the backend service.
# Defines image, service, resources, and persistence settings.
# Last Updated: 2026-05-12

replicaCount: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

image:
  repository: luudinhmac/portfolio-backend
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 3001

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

persistence:
  size: 5Gi
  path: /data/k8s/storage/backend-uploads

env:
  tz: "Asia/Ho_Chi_Minh"
  port: "3001"

ingress:
  host: "staging.luumac.io.vn"
  secretName: "luumac-tls-staging"

namespace: portfolio
