# ==============================================================================
# COMPONENT: Backend Persistence Layer
# ROLE: Persistent storage for application uploads
# STORAGE: hostPath (local node storage) - NOT suitable for multi-node clusters
# ==============================================================================

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "backend.fullname" . }}-pvc
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  storageClassName: {{ .Values.persistence.storageClassName | default "local-path" | quote }}

