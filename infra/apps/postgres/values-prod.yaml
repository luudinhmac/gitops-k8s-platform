# Description: Production override values for the PostgreSQL database.
# Used when deploying to the production environment via ArgoCD or Helm.
# Last Updated: 2026-05-12

replicaCount: 1

image:
  repository: postgres
  tag: "16.13-alpine"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 5432

persistence:
  size: 10Gi
  path: /data/k8s/postgres-infra-prod

auth:
  user: portfolio_user
  password: change_this_in_prod_manually_or_via_secret
  database: portfolio_production

namespace: infra-prod

podSecurityContext:
  fsGroup: 70

