# ==============================================================================
# COMPONENT: PostgreSQL Storage
# ROLE: High-integrity storage for database files
# STORAGE: hostPath with 'Retain' policy; ensures data survival after pod death
# ==============================================================================

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "postgres.fullname" . }}-pvc
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  storageClassName: {{ .Values.persistence.storageClassName | default "local-path" | quote }}

