# ==============================================================================
# COMPONENT: PostgreSQL Credentials
# ROLE: Sensitive identity and access management for database
# SECURITY: Base64 encoded; should be integrated with Vault/ExternalSecrets in prod
# ==============================================================================

{{- if .Values.sealedSecret.enabled }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ include "postgres.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
spec:
  encryptedData:
    POSTGRES_USER: {{ .Values.sealedSecret.encryptedData.POSTGRES_USER | quote }}
    POSTGRES_PASSWORD: {{ .Values.sealedSecret.encryptedData.POSTGRES_PASSWORD | quote }}
    POSTGRES_DB: {{ .Values.sealedSecret.encryptedData.POSTGRES_DB | quote }}
  template:
    metadata:
      name: {{ include "postgres.fullname" . }}-secret
      namespace: {{ .Release.Namespace }}
      labels:
        {{- include "postgres.labels" . | nindent 8 }}
    type: Opaque
{{- else }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "postgres.fullname" . }}-secret
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
type: Opaque
data:
  POSTGRES_USER: {{ .Values.auth.user | b64enc | quote }}
  POSTGRES_PASSWORD: {{ .Values.auth.password | b64enc | quote }} # IMPORTANT: Rotation requires pod restart; use robust password policy
  POSTGRES_DB: {{ .Values.auth.database | b64enc | quote }}
{{- end }}

