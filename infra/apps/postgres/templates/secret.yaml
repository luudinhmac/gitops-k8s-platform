# ==============================================================================
# COMPONENT: PostgreSQL Credentials
# ROLE: Sensitive identity and access management for database
# SECURITY: Base64 encoded; should be integrated with Vault/ExternalSecrets in prod
# ==============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: {{ include "postgres.fullname" . }}-secret
type: Opaque
data:
  POSTGRES_USER: {{ .Values.auth.user | b64enc | quote }}
  POSTGRES_PASSWORD: {{ .Values.auth.password | b64enc | quote }} # IMPORTANT: Rotation requires pod restart; use robust password policy
  POSTGRES_DB: {{ .Values.auth.database | b64enc | quote }}
