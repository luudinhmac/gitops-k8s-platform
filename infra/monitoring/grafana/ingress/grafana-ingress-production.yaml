# Description: Ingress manifest for Grafana in the production environment.
# Provides secure access via https://grafana.luumac.io.vn with admin allowlist.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: monitoring-grafana-production
  namespace: monitoring
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    # Re-using the same security middlewares
    traefik.ingress.kubernetes.io/router.middlewares: infra-admin-allowlist@kubernetescrd
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  rules:
  - host: grafana.luumac.io.vn
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: monitoring-grafana
            port:
              number: 80
  tls:
  - hosts:
    - grafana.luumac.io.vn
    secretName: grafana-prod-tls
