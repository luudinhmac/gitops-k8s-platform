# Description: Tasks to deploy and configure the Kubernetes Dashboard.
# Deploys the dashboard and creates an admin user for access.
# Last Updated: 2026-05-12

---
- name: Install Kubernetes Dashboard
  become_user: "{{ ansible_operator_user }}"
  command: kubectl apply -f https://raw.githubusercontent.com/kubernetes/dashboard/v2.7.0/aio/deploy/recommended.yaml

- name: Create Dashboard Service Account
  become_user: "{{ ansible_operator_user }}"
  copy:
    content: |
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: "{{ dashboard_admin_user }}"
        namespace: "{{ dashboard_namespace }}"
    dest: "{{ user_home }}/dashboard-admin-sa.yaml"

- name: Create ClusterRoleBinding for Dashboard Admin
  become_user: "{{ ansible_operator_user }}"
  copy:
    content: |
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: "{{ dashboard_admin_user }}"
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: cluster-admin
      subjects:
      - kind: ServiceAccount
        name: "{{ dashboard_admin_user }}"
        namespace: "{{ dashboard_namespace }}"
    dest: "{{ user_home }}/dashboard-admin-crb.yaml"

- name: Apply Dashboard Admin configs
  become_user: "{{ ansible_operator_user }}"
  command: kubectl apply -f "{{ user_home }}/{{ item }}"
  loop:
    - dashboard-admin-sa.yaml
    - dashboard-admin-crb.yaml
