# Description: Ingress manifest for Kubernetes Dashboard in the production environment.
# Provides secure access via HTTPS with admin allowlist protection.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-dashboard-ingress-production
  namespace: kubernetes-dashboard
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: infra-admin-allowlist@kubernetescrd
    traefik.ingress.kubernetes.io/service.serversscheme: https
    traefik.ingress.kubernetes.io/service.serverstransport: infra-insecure-transport@kubernetescrd
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
  - host: k8s-prod.luumac.io.vn
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kubernetes-dashboard
            port:
              number: 443
  tls:
  - hosts:
    - k8s-prod.luumac.io.vn
    secretName: k8s-prod-tls
