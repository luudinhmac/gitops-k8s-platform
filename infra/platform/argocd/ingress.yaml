# ==============================================================================
# COMPONENT: ArgoCD Ingress
# ROLE: External access gateway for ArgoCD UI/API
# SECURITY: SSL/TLS termination with Traefik; Restricted to authorized IPs in prod
# ==============================================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-ingress
  namespace: argocd
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure # Force HTTPS entrypoint
    traefik.ingress.kubernetes.io/router.tls: "true" # Enable TLS termination at the ingress controller
    traefik.ingress.kubernetes.io/router.middlewares: infra-admin-allowlist@kubernetescrd,infra-infra-compress@kubernetescrd # Security + Performance
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  rules:
    - host: argocd.luumac.io.vn # FQDN for ArgoCD access
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
  tls:
    - hosts:
        - argocd.luumac.io.vn
      secretName: luumac-wildcard-tls # Ensure this secret is managed by cert-manager or manual upload
