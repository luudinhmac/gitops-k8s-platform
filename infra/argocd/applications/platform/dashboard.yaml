apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-dashboard
  namespace: argocd
spec:
  project: platform-project
  source:
    repoURL: https://gitlab.com/portfolio-macld/portfolio-infratructure.git
    targetRevision: main
    path: platform/kubernetes-dashboard
  destination:
    server: https://kubernetes.default.svc
    namespace: kubernetes-dashboard
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
