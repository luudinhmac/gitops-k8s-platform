apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-etcd-backup
  namespace: argocd
spec:
  project: platform-project
  source:
    repoURL: https://gitlab.com/portfolio-macld/portfolio-infratructure.git
    targetRevision: main
    path: platform/etcd-backup
  destination:
    server: https://kubernetes.default.svc
    namespace: infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
