apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-argocd-ingress
  namespace: argocd
spec:
  project: platform-project
  source:
    repoURL: https://gitlab.com/portfolio-macld/portfolio-infratructure.git
    targetRevision: main
    path: platform/argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
