apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-kube-prometheus-stack
  namespace: argocd
spec:
  project: monitoring-project
  source:
    chart: kube-prometheus-stack
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 85.1.3
    helm:
      releaseName: monitoring
      values: |
        grafana:
          adminPassword: admin
          persistence:
            enabled: true
            size: 2Gi
          initChownData:
            enabled: false
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi

        prometheus:
          prometheusSpec:
            scrapeInterval: 60s
            evaluationInterval: 60s
            retention: 2d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 5Gi
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                cpu: 300m
                memory: 512Mi

        alertmanager:
          alertmanagerSpec:
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                cpu: 50m
                memory: 64Mi
            env:
              - name: TELEGRAM_BOT_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: alertmanager-telegram-secrets
                    key: telegram_bot_token
              - name: TELEGRAM_CHAT_ID
                valueFrom:
                  secretKeyRef:
                    name: alertmanager-telegram-secrets
                    key: telegram_chat_id
          config:
            global:
              resolve_timeout: 5m
            route:
              group_by: ['alertname', 'namespace', 'job']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 4h
              receiver: 'telegram-infra-alerts'
              routes:
                - matchers:
                    - alertname = Watchdog
                  receiver: 'null'
            receivers:
              - name: 'null'
              - name: 'telegram-infra-alerts'
                telegram_configs:
                  - bot_token: '${TELEGRAM_BOT_TOKEN}'
                    chat_id: ${TELEGRAM_CHAT_ID}
                    parse_mode: 'HTML'
                    send_resolved: true
                    message: |
                      {{ range .Alerts -}}
                      {{ if eq .Status "firing" }}🚨 <b>[CẢNH BÁO HẠ TẦNG] {{ .Labels.alertname }}</b>{{ else }}✅ <b>[ĐÃ PHỤC HỒI] {{ .Labels.alertname }}</b>{{ end }}
                      <b>Độ nghiêm trọng:</b> <code>{{ .Labels.severity }}</code>
                      <b>Namespace:</b> <code>{{ .Labels.namespace }}</code>
                      <b>Pod liên quan:</b> <code>{{ .Labels.pod }}</code>
                      <b>Chi tiết:</b> {{ .Annotations.summary }}
                      <b>Thời gian:</b> {{ .StartsAt.Local }}
                      {{ end }}

        prometheusOperator:
          resources:
            requests:
              cpu: 20m
              memory: 50Mi
            limits:
              cpu: 100m
              memory: 100Mi

        kube-state-metrics:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi

        prometheus-node-exporter:
          service:
            port: 9101
            targetPort: 9101
          hostPort: 9101
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi

        # Disable control plane monitoring which is not needed on single-node VPS
        kubeEtcd:
          enabled: false
        kubeControllerManager:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeProxy:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
