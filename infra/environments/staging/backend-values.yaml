# ==============================================================================
# ENVIRONMENT: Staging (Backend)
# PURPOSE: Integration testing and preview
# UPDATE POLICY: Automated CI/CD image tag updates
# ==============================================================================

replicaCount: 1
image:
  tag: "dev-722bc21a"
ingress:
  enabled: true
  issuer: letsencrypt-prod
  rateLimit:
    enabled: true
    average: 100
    burst: 50
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: blog-staging-portfolio-backend-staging-rate-limit@kubernetescrd,infra-infra-compress@kubernetescrd
  hosts:
    - host: api-staging.luumac.io.vn # Staging API endpoint
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: portfolio-backend-staging-tls
      hosts:
        - api-staging.luumac.io.vn
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
persistence:
  storageClassName: "longhorn"
env:
  tz: "Asia/Ho_Chi_Minh"
  port: "3001"
sealedSecret:
  enabled: true
  encryptedData:
    DATABASE_URL: ""
    JWT_SECRET: ""
    MINIO_ACCESS_KEY: ""
    MINIO_SECRET_KEY: ""
    MINIO_BUCKET: ""
    MINIO_CDN_URL: ""
    MINIO_ENDPOINT: ""
    MINIO_PORT: ""
    MINIO_USE_SSL: ""
    STORAGE_TYPE: ""
redis:
  enabled: true
  encryptedPassword: ""
