# Description: Helm values for the PostgreSQL staging database.
# Overrides default values with staging-specific storage and configuration settings.
# Last Updated: 2026-05-12

replicaCount: 1

persistence:
  size: 5Gi
  storageClassName: "longhorn"


service:
  type: ClusterIP
  port: 5432

sealedSecret:
  enabled: true
  encryptedData:
    POSTGRES_USER: ""
    POSTGRES_PASSWORD: ""
    POSTGRES_DB: ""

podSecurityContext:
  fsGroup: 70


