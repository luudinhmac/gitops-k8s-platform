# Description: Helm values for the frontend production environment.
# Overrides default values with production-specific settings.
# Last Updated: 2026-05-12

image:
  tag: "v0.0.17@sha256:876f0b8d79478e614763874e934e9154945d9a663889df743e093944b120a453"
ingress:
  enabled: true
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  host: blog.luumac.io.vn
  secretName: portfolio-frontend-tls
  issuer: letsencrypt-prod
env:
  internalApiUrl: "http://portfolio-backend-production:3001/api/v1"
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
