# Description: Helm values for the frontend production environment.
# Overrides default values with production-specific settings.
# Last Updated: 2026-05-12

image:
  tag: "v0.0.19@sha256:bc350a7fe58816215552110d57d4dc2c9830e63688a8d8a3f32c2a149012c818"
ingress:
  enabled: true
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  host: blog.luumac.io.vn
  secretName: portfolio-frontend-tls
  issuer: letsencrypt-prod
env:
  internalApiUrl: "http://portfolio-backend-production:3001/api/v1"
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
