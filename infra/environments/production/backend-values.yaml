# ==============================================================================
# ENVIRONMENT: Production (Backend)
# PURPOSE: Live traffic handling
# SECURITY: Strict TLS enforcement with Let's Encrypt certificates
# ==============================================================================

replicaCount: 1
image:
  tag: "v0.0.18@sha256:5a95dab316e151b5477c2f391ed49770d8b37f190a79af23c86116b2088b00ff"
ingress:
  enabled: true
  issuer: letsencrypt-prod
  rateLimit:
    enabled: true
    average: 100
    burst: 50
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod" # Triggers cert-manager to provision production certificates
    traefik.ingress.kubernetes.io/router.middlewares: blog-prod-portfolio-backend-production-rate-limit@kubernetescrd
  hosts:
    - host: api.luumac.io.vn # Production API endpoint
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: portfolio-backend-tls
      hosts:
        - api.luumac.io.vn
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
persistence:
  storageClassName: "longhorn"
sealedSecret:
  enabled: true
  encryptedData:
    DATABASE_URL: ""
    JWT_SECRET: ""
    MINIO_ACCESS_KEY: ""
    MINIO_SECRET_KEY: ""
    MINIO_BUCKET: ""
    MINIO_CDN_URL: ""
    MINIO_ENDPOINT: ""
    MINIO_PORT: ""
    MINIO_USE_SSL: ""
    STORAGE_TYPE: ""
redis:
  enabled: true
  encryptedPassword: ""
